name: Update Profile Automation Matrix

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Matrix Updater Execution Engine
        run: |
          python3 -c '
          import datetime

          current_time = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          matrix_content = f"""<!-- START_AUTOMATION_MATRIX -->
          | Component / Environment | Status | Last Verified | Core Engineering Metric |
          | :--- | :--- | :--- | :--- |
          | **`🚀 Production Monitored`** | ![Monitoring](https://img.shields.io/badge/OpenShift-Active-brightgreen?style=flat-square) | _`{current_time}`_ | 15+ Microservice Anomalies Resolved |
          | **`🏗️ IaC Automation`** | ![Terraform](https://img.shields.io/badge/Terraform-Drift_0%25-blue?style=flat-square) | _`{current_time}`_ | Deployment runtime optimized to `< 5m` |
          | **`🐳 Artifact Registry`**| ![Docker](https://img.shields.io/badge/Docker-77%25_Optimized-blueviolet?style=flat-square) | _`{current_time}`_ | Multi-stage image reduction achieved |
          | **`🔒 System Hardening`** | ![RHEL9](https://img.shields.io/badge/RHEL_9-Hardened-success?style=flat-square) | _`{current_time}`_ | Reproducible Ansible Base Target |
          <!-- END_AUTOMATION_MATRIX -->"""

          with open("README.md", "r") as f:
              readme = f.read()

          import re
          pattern = r"<!-- START_AUTOMATION_MATRIX -->.*?<!-- END_AUTOMATION_MATRIX -->"
          updated_readme = re.sub(pattern, matrix_content, readme, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(updated_readme)
          '

      - name: Commit and Push Infrastructure Status Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore(infra): automated refresh of profile deployment status matrix [skip ci]"
          git push
